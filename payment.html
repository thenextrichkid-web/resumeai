<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — ResumeAI Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E8420A; --bg: #fafaf8; --text: #1a1a1a; --border: rgba(0,0,0,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { display: flex; align-items: center; padding: 20px 5%; border-bottom: 1px solid var(--border); background: white; }
        .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
        .diamond-mark { width: 20px; height: 20px; background: var(--brand); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%, 50% 35%, 65% 50%, 50% 65%, 35% 50%); }
        .logo-name { font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: bold; }

        .checkout-container { max-width: 450px; margin: auto; padding: 40px 20px; text-align: center; }
        .step-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--brand); font-weight: 800; margin-bottom: 10px; }
        h1 { font-family: 'Instrument Serif', serif; font-size: 42px; line-height: 1; margin-bottom: 20px; }
        
        .price-card { background: white; border: 1px solid var(--border); border-radius: 32px; padding: 40px 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); position: relative; }
        .price-display { font-family: 'Instrument Serif', serif; font-size: 64px; color: var(--brand); margin: 10px 0; }
        
        .btn-pay { width: 100%; padding: 20px; background: var(--text); color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .btn-whatsapp { width: 100%; padding: 18px; background: #25D366; color: white; border: none; border-radius: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #waiting-status { display: none; margin-top: 20px; font-size: 12px; color: var(--brand); font-weight: 700; letter-spacing: 1px; }
        .loader { width: 12px; height: 12px; border: 2px solid var(--brand); border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-right: 8px; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo-wrap"><div class="diamond-mark"></div><span class="logo-name">ResumeAI</span></a>
</nav>

<div class="checkout-container">
    <div class="step-label">Secure Transaction</div>
    <h1>Pro <span style="font-style: italic;">Uplink</span></h1>
    
    <div class="price-card">
        <div class="price-display">₹99</div>
        <button class="btn-pay" onclick="initiateUPI()">Step 1: Pay via UPI</button>
        <a id="wa-btn" href="#" class="btn-whatsapp" onclick="startVerification(event)">Step 2: Verify on WhatsApp</a>

        <div id="waiting-status">
            <span class="loader"></span> VERIFYING UPLINK STATUS...
        </div>
    </div>
</div>

<script>
    const pName = localStorage.getItem('pilot_name');
    const pEmail = localStorage.getItem('pilot_email');
    let checkInterval;

    function initiateUPI() {
        const upiUrl = `upi://pay?pa=alliancebusiness.abs@okaxis&pn=ResumeAI&am=99.00&tn=Pro%20Uplink%20${encodeURIComponent(pName)}&cu=INR`;
        window.location.href = upiUrl;
    }

    function startVerification(e) {
        const waNumber = "918309167536"; // Your WhatsApp Number
        const msg = `Payment Sent. Pilot: ${pName} (${pEmail}). Requesting 100% Reconstruct activation.`;
        e.target.href = `https://wa.me/${waNumber}?text=${encodeURIComponent(msg)}`;
        
        document.getElementById('waiting-status').style.display = 'block';
        
        // Start polling your n8n workflow to see if the sheet status is "Paid"
        if (!checkInterval) {
            checkInterval = setInterval(checkStatus, 5000);
        }
    }

    async function checkStatus() {
        try {
            // This calls a new n8n webhook we'll set up to check the Google Sheet
            const response = await fetch(`https://alliancebusiness.app.n8n.cloud/webhook/check-status?email=${pEmail}`);
            const data = await response.json();
            
            if (data.status === 'Paid') {
                clearInterval(checkInterval);
                window.location.href = 'dashboard.html';
            }
        } catch (err) { console.log("Waiting for verification..."); }
    }
</script>
</body>
</html>
