<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeAI — Deep Reconstruct</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E8420A; }
        body { font-family: 'DM Sans', sans-serif; background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%); color: white; margin: 0; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: rgba(15, 15, 25, 0.95); border: 1px solid rgba(232, 66, 10, 0.4); padding: 40px; border-radius: 32px; max-width: 450px; width: 90%; backdrop-filter: blur(15px); }
        .shield-glow { font-size: 70px; filter: drop-shadow(0 0 25px rgba(232, 66, 10, 0.8)); margin-bottom: 20px; }
        
        .price-strike { font-size: 22px; color: #777; margin-right: 12px; position: relative; display: inline-block; transition: 0.5s; }
        .price-strike.slashed::after { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 2px; background: #E8420A; transform: rotate(-15deg); }
        .price-active { font-family: 'Instrument Serif'; font-size: 72px; color: var(--brand); opacity: 0; transform: translateY(10px); transition: 1s ease-out; }
        .price-active.reveal { opacity: 1; transform: translateY(0); }

        .note-box { background: rgba(232, 66, 10, 0.1); border: 1px solid rgba(232, 66, 10, 0.3); padding: 15px; border-radius: 12px; font-size: 11px; color: #ff8e6e; margin: 20px 0; line-height: 1.5; text-align: left; }
        .qr-wrap { background: white; padding: 15px; border-radius: 20px; width: 160px; margin: 20px auto; }
        .qr-wrap img { width: 100%; }

        .btn-action { width: 100%; padding: 18px; background: var(--brand); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px; margin-top: 10px; }
        .btn-whatsapp { background: #25D366; }
        .upi-copy { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 12px; border-radius: 12px; margin: 10px 0; font-family: monospace; cursor: pointer; display: flex; justify-content: space-between; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="shield-glow">🛡️</div>
        <h1 style="font-family:'Instrument Serif'; margin: 0;">Deep Reconstruct</h1>
        
        <div style="margin:20px 0;">
            <span id="strike-p" class="price-strike">₹999</span>
            <div id="reveal-p" class="price-active">₹99</div>
        </div>

        <div class="note-box">
            <strong>IMPORTANT:</strong> If the auto-payment button fails, please <strong>Copy the UPI ID</strong> or <strong>Scan/Download the QR</strong>. Once payment is done, click <strong>WhatsApp</strong> to send your screenshot for instant confirmation.
        </div>

        <div class="qr-wrap"><img src="qr-code.jpg" alt="Scan to Pay"></div>

        <button onclick="openUPI()" class="btn-action">UNLOCK PILOT ACCESS</button>
        
        <div class="upi-copy" onclick="copyUPI('8309167536@seyes')">
            <span id="upi-val">8309167536@seyes</span><span style="color:var(--brand)">COPY ID</span>
        </div>

        <button onclick="sendWhatsApp()" class="btn-action btn-whatsapp">WHATSAPP FOR CONFIRMATION</button>
        <button onclick="verifyPayment()" class="btn-action" style="background: #1a1a1a; margin-top: 15px;">VERIFY ACTIVATION STATUS</button>
    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('strike-p').classList.add('slashed');
                document.getElementById('reveal-p').classList.add('reveal');
            }, 1000);
        };

        function openUPI() {
            window.location.href = `upi://pay?pa=8309167536@seyes&pn=ResumeAI&am=99&cu=INR`;
        }

        function copyUPI(id) {
            navigator.clipboard.writeText(id);
            document.getElementById('upi-val').innerText = "COPIED!";
            setTimeout(() => { document.getElementById('upi-val').innerText = id; }, 2000);
        }

        function sendWhatsApp() {
            const pName = localStorage.getItem('pilot_name') || 'Pilot';
            window.location.href = `https://wa.me/918309167536?text=Payment%20Done%20for%20${pName}.%20UTR:%20`;
        }

        async function verifyPayment() {
            const email = localStorage.getItem('pilot_email');
            if (!email) return alert("Pilot email not found. Please restart the process.");
            
            const btn = document.querySelector('button[onclick="verifyPayment()"]');
            const originalText = btn.innerText;
            btn.innerText = "VERIFYING UPLINK...";
            
            try {
                const res = await fetch('https://drone-unleash-diving.ngrok-free.dev/webhook/verify-pilot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const data = await res.json();
                
                if (data.status === "PAID") {
                    btn.innerText = "ACCESS GRANTED. TRANSFERRING...";
                    btn.style.background = "#10b981";
                    setTimeout(() => { window.location.href = `https://resumepi-lot.vercel.app/onboarding.html?email=${encodeURIComponent(email)}`; }, 1500);
                } else {
                    btn.innerText = originalText;
                    alert("Status is still PENDING. If you completed the payment, please share the screenshot on WhatsApp and wait for the manual override.");
                }
            } catch (err) { btn.innerText = originalText; alert("Verification failed. Please try again."); }
        }
    </script>
</body>
</html>
