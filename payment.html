<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeAI — Deep Reconstruct</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E8420A; }
        body { font-family: 'DM Sans', sans-serif; background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%); color: white; margin: 0; text-align: center; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: rgba(15, 15, 25, 0.95); border: 1px solid rgba(232, 66, 10, 0.4); padding: 40px; border-radius: 32px; max-width: 450px; width: 90%; backdrop-filter: blur(15px); }
        .shield-glow { font-size: 70px; filter: drop-shadow(0 0 25px rgba(232, 66, 10, 0.8)); margin-bottom: 20px; }
        .price-strike { font-size: 22px; color: #777; margin-right: 12px; position: relative; display: inline-block; transition: 0.5s; }
        .price-strike.slashed::after { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 2px; background: #E8420A; transform: rotate(-15deg); }
        .price-active { font-family: 'Instrument Serif'; font-size: 72px; color: var(--brand); opacity: 0; transform: translateY(10px); transition: 1s ease-out; }
        .price-active.reveal { opacity: 1; transform: translateY(0); }
        .qr-wrap { background: white; padding: 15px; border-radius: 20px; width: 180px; margin: 25px auto; }
        .qr-wrap img { width: 100%; border-radius: 10px; }
        .btn-action { width: 100%; padding: 20px; background: var(--brand); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 13px; margin-top: 15px; }
        .btn-whatsapp { background: #25D366; }
        .upi-copy { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 12px; border-radius: 12px; margin: 20px 0; font-family: monospace; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="background:var(--brand); color:white; padding:5px 12px; border-radius:4px; display:inline-block; font-size:10px; font-weight:900; margin-bottom:15px;">90% RECON DISCOUNT APPLIED</div>
        <div class="shield-glow">🛡️</div>
        <h1 style="font-family:'Instrument Serif'; margin: 0 0 10px 0;">Deep Reconstruct</h1>
        
        <div style="margin:20px 0;">
            <span id="strike-p" class="price-strike">₹999</span>
            <div id="reveal-p" class="price-active">₹99</div>
        </div>

        <div class="qr-wrap"><img src="qr-code.jpg" alt="Scan to Pay"></div>

        <button onclick="openUPI()" class="btn-action">Unlock Pilot Access</button>
        
        <div class="upi-copy" onclick="copyUPI('8309167536@seyes')">
            <span id="upi-val">8309167536@seyes</span><span style="color:var(--brand)">COPY ID</span>
        </div>

        <button onclick="sendWhatsApp()" class="btn-action btn-whatsapp">SEND UTR VIA WHATSAPP</button>
    </div>

    <script>
        // Trigger animations on load
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('strike-p').classList.add('slashed');
                document.getElementById('reveal-p').classList.add('reveal');
            }, 1200);
        };

        function openUPI() {
            const upiLink = `upi://pay?pa=8309167536@seyes&pn=ResumeAI&mc=0000&tr=${Date.now()}&tn=ResumeAI%20Uplink&am=99&cu=INR`;
            window.location.href = upiLink;
        }

        function copyUPI(id) {
            navigator.clipboard.writeText(id);
            document.getElementById('upi-val').innerText = "COPIED!";
            setTimeout(() => { document.getElementById('upi-val').innerText = id; }, 2000);
        }

        function sendWhatsApp() {
            const pName = localStorage.getItem('pilot_name') || 'Pilot';
            const waMsg = encodeURIComponent(`I have initiated my 100% Reconstruct for ${pName}. UTR: `);
            window.location.href = `https://wa.me/918309167536?text=${waMsg}`;
        }
    </script>
</body>
</html>
