<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — ResumeAI Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E8420A; --bg: #fafaf8; --text: #1a1a1a; --border: rgba(0,0,0,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        nav { display: flex; align-items: center; padding: 25px 5%; background: white; border-bottom: 1px solid var(--border); }
        .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
        .diamond-mark { width: 24px; height: 24px; background: var(--brand); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%, 50% 35%, 65% 50%, 50% 65%, 35% 50%); }
        .container { max-width: 600px; margin: 80px auto; padding: 0 20px; }
        .card { background: white; padding: 40px; border-radius: 24px; border: 1px solid var(--border); }
        h1 { font-family: 'Instrument Serif', serif; font-size: 42px; margin-bottom: 30px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--brand); margin-bottom: 8px; letter-spacing: 1px; }
        input, textarea { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; font-family: inherit; }
        .btn { background: var(--brand); color: white; padding: 18px; border: none; border-radius: 50px; font-weight: 700; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <nav><a href="index.html" class="logo-wrap"><div class="diamond-mark"></div><span style="font-family:'Instrument Serif'; font-weight:bold; font-size:24px;">ResumeAI</span></a></nav>
    <div class="container">
        <h1>Connect with <span style="font-style: italic;">AXONIC Experts</span></h1>
        <div class="card">
            <p style="margin-bottom:30px; color:#666;">For technical support, Pro upgrades, or Enterprise AI consulting, please submit your query below.</p>
            <form id="contactForm" onsubmit="submitContact(event)">
                <label for="contact-name">FULL NAME</label><input type="text" id="contact-name" name="name">
                <label for="contact-email">EMAIL ADDRESS</label><input type="email" id="contact-email" name="email">
                <label for="contact-enquiry">ENQUIRY TYPE</label>
                <select id="contact-enquiry" name="enquiry" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;">
                    <option>Technical Support</option>
                    <option>Enterprise AI Consulting</option>
                    <option>ResumePilot Pro Upgrade</option>
                </select>
                <label for="contact-message">MESSAGE</label><textarea id="contact-message" name="message" rows="5"></textarea>
                <button type="submit" class="btn" id="submitBtn">Submit Tactical Request</button>
            </form>
        </div>
    </div>

    <script>
        async function submitContact(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Transmitting...";
            
            const payload = {
                name: document.getElementById('contact-name').value,
                email: document.getElementById('contact-email').value,
                enquiry: document.getElementById('contact-enquiry').value,
                message: document.getElementById('contact-message').value
            };

            try {
                // Set up a new n8n webhook specifically for the contact form
                await fetch('https://YOUR_NGROK_URL/webhook/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                btn.innerText = "Request Received";
                btn.style.background = "#10b981";
                document.getElementById('contactForm').reset();
            } catch (err) {
                alert("Transmission failed. Please email axonic.briefings@gmail.com directly.");
                btn.innerText = "Submit Tactical Request";
            }
        }
    </script>
</body>
</html>
