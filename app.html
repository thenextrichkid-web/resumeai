<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeAI — Tactical Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E8420A; --bg: #fafaf8; --text: #1a1a1a; --border: rgba(0,0,0,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.8s, color 0.8s; }
        
        .nav { display: flex; align-items: center; padding: 20px 5%; border-bottom: 1px solid var(--border); background: white; }
        .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
        .diamond-mark { width: 24px; height: 24px; background: var(--brand); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%, 50% 35%, 65% 50%, 50% 65%, 35% 50%); }
        .logo-name { font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: bold; }

        .container { max-width: 650px; margin: 40px auto; padding: 20px; text-align: center; }
        .pilot-welcome { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--brand); margin-bottom: 10px; font-weight: 700; }
        h1 { font-family: 'Instrument Serif', serif; font-size: 42px; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 700; color: var(--brand); margin-bottom: 8px; display: block; letter-spacing: 1px; }
        textarea, input, select { width: 100%; padding: 16px; border-radius: 12px; border: 1.5px solid var(--border); font-family: inherit; font-size: 14px; outline: none; box-sizing: border-box; background: white; }
        
        .upload-box { border: 2px dashed var(--border); padding: 50px 20px; border-radius: 24px; background: white; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .upload-box:hover { border-color: var(--brand); background: #fffcfb; transform: translateY(-2px); }
        
        #scan-container { display: none; margin-top: 40px; }
        .progress-track { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; margin: 25px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--brand); transition: width 0.1s; }

        #feedback-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(12px); }
        .modal-card { background:white; padding:45px; border-radius:32px; max-width:580px; width:100%; text-align:left; color: #1a1a1a; max-height: 85vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        
        /* Report Typography */
        .report-body h1 { font-family: 'Instrument Serif'; color: var(--brand); font-size: 36px; margin: 0 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .report-body h3 { font-family: 'DM Sans'; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: #666; margin-top: 25px; font-weight: 700; }
        .report-body p { line-height: 1.8; font-size: 16px; margin: 15px 0; color: #333; }
        .report-body ul { padding-left: 20px; margin: 15px 0; }
        .report-body li { margin-bottom: 12px; line-height: 1.6; font-size: 15px; }
        .report-body strong { color: var(--brand); font-weight: 600; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }

        body.dark-mode { background: #050505; color: white; }
        body.dark-mode .nav { background: #050505; border-bottom: 1px solid #222; }
        body.dark-mode .modal-card { background: #111; color: #efefef; border: 1px solid #333; }
        body.dark-mode .report-body h3 { color: #999; }
        body.dark-mode .report-body p { color: #ddd; }
    </style>
</head>
<body>

<div class="nav">
    <a href="/" class="logo-wrap">
        <div class="diamond-mark"></div>
        <span class="logo-name">ResumeAI</span>
    </a>
</div>

<div class="container">
    <div class="pilot-welcome" id="pilot-display">PILOT AUTHORIZATION REQUIRED</div>
    <h1 id="headline">Initiate <span style="font-style: italic;">Tactical</span> Scan</h1>
    
    <div id="input-stage">
        <div class="input-group">
            <label>ACQUISITION SOURCE</label>
            <select id="source-input">
                <option value="Direct">How did you find us?</option>
                <option value="Google Search">Google Search</option>
                <option value="Facebook">Facebook</option>
                <option value="Instagram">Instagram</option>
                <option value="LinkedIn">LinkedIn</option>
                <option value="Referral">Referral / Word of Mouth</option>
            </select>
        </div>

        <div class="input-group">
            <label>TARGET JOB DESCRIPTION</label>
            <textarea id="jd-input" placeholder="Paste the job requirements here for AI calibration..."></textarea>
        </div>

        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 32px; margin-bottom: 15px;">📂</div>
            <p style="font-weight:600; font-size: 16px;">Drop Resume here or Click to Upload</p>
            <p style="font-size: 12px; color: #888;">Supports PDF & DOCX (Direct Binary Analysis)</p>
            <input type="file" id="file-input" style="display:none" onchange="initiateScan(this)">
        </div>
    </div>

    <div id="scan-container">
        <p id="status-text" style="font-family: monospace; color: var(--brand); letter-spacing: 2px; font-weight: bold;">UPLINKING DATA STREAM...</p>
        <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
        <p id="percentage" style="font-family: 'Instrument Serif'; font-size: 36px;">0%</p>
    </div>
</div>

<div id="feedback-modal"><div class="modal-card" id="modal-content"></div></div>

<script>
    // Pulling Pilot Info
    const pName = localStorage.getItem('pilot_name') || 'Guest';
    const pEmail = localStorage.getItem('pilot_email') || 'Unknown';
    document.getElementById('pilot-display').innerText = `PILOT: ${pName.toUpperCase()}`;

    let scanCount = 0;
    let fullAnalysis = "";

    async function initiateScan(input) {
        const jd = document.getElementById('jd-input').value;
        const source = document.getElementById('source-input').value;
        
        if (!jd || jd.length < 20) { alert("Insufficient JD data for calibration."); return; }
        
        if (scanCount >= 1 && fullAnalysis) {
            triggerUI();
            return;
        }

        if (input.files && input.files[0]) {
            triggerUI();
            
            const formData = new FormData();
            formData.append('resume', input.files[0]);
            formData.append('name', pName);
            formData.append('email', pEmail);
            formData.append('source', source);
            formData.append('job_description', jd);

            try {
                // REPLACE WITH YOUR LIVE n8n WEBHOOK URL
                const response = await fetch('http://localhost:5678/webhook-test/resume-scan', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    fullAnalysis = data.text; 
                }
            } catch (err) { console.error("Critical Uplink Failure:", err); }
        }
    }

    function triggerUI() {
        document.getElementById('input-stage').style.display = 'none';
        document.getElementById('scan-container').style.display = 'block';
        let width = 0;
        const interval = setInterval(() => {
            let cap = (scanCount === 0) ? 54 : 62;
            if (width >= cap) {
                clearInterval(interval);
                if (fullAnalysis) { scanCount++; showReport(); }
                else { 
                    document.getElementById('status-text').innerText = "AI DECODING NARRATIVE...";
                    setTimeout(triggerUI, 800); 
                }
            } else {
                width++;
                document.getElementById('progress-bar').style.width = width + '%';
                document.getElementById('percentage').innerText = width + '%';
            }
        }, 50);
    }

    function showReport() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('modal-content');
        
        const parts = fullAnalysis.split('[SCAN_2]');
        const scan1Raw = parts[0].replace('[SCAN_1]', '').trim();
        const scan2Raw = parts[1] ? parts[1].trim() : "";

        // Executive Markdown Formatter
        const format = (text) => {
            return text.replace(/# (.*)/g, '<h1>$1</h1>')
                       .replace(/### (.*)/g, '<h3>$1</h3>')
                       .replace(/\*\* (.*)\*\*/g, '<strong>$1</strong>')
                       .replace(/\* (.*)/g, '<li>$1</li>')
                       .replace(/---/g, '<hr>')
                       .replace(/\n/g, '<br>');
        };

        modal.style.display = 'flex';
        if (scanCount === 1) {
            content.innerHTML = `
                <div class="report-body">${format(scan1Raw)}</div>
                <button onclick="closeModal()" style="width:100%; padding:20px; background:var(--brand); color:white; border:none; border-radius:14px; margin-top:25px; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">Manual Correction & Re-Scan</button>
            `;
        } else {
            document.body.classList.add('dark-mode');
            content.innerHTML = `
                <div class="report-body">${format(scan2Raw)}</div>
                <button onclick="window.location.href='payment.html'" style="width:100%; padding:20px; background:var(--brand); color:white; border:none; border-radius:14px; margin-top:25px; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">Uplink to Pilot Expertise (PRO)</button>
            `;
        }
    }

    function closeModal() {
        document.getElementById('feedback-modal').style.display = 'none';
        document.getElementById('input-stage').style.display = 'block';
        document.getElementById('scan-container').style.display = 'none';
        document.getElementById('headline').innerHTML = "Secondary <span style='font-style: italic;'>Tactical</span> Scan";
    }
</script>
</body>
</html>
