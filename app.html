<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeAI™ | Powered by ABS</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --brand: #E8420A; --core: #00f2ff; --bg: #fafaf8; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); margin: 0; transition: background 1s, color 1s; }
    
    /* Transition State: Space Mode */
    body.space-mode { background: #050a14; color: white; }

    /* Logo Header */
    .nav { display: flex; justify-content: center; padding: 30px; }
    .logo-wrap { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-mark { width: 35px; height: 35px; background: var(--brand); clip-path: polygon(50% 0%, 0% 100%, 50% 80%, 100% 100%); box-shadow: 0 0 15px var(--brand); }
    .logo-name { font-family: 'Orbitron'; font-size: 24px; font-weight: 900; color: #1a1a1a; transition: 0.5s; }
    body.space-mode .logo-name { color: white; }

    /* Main Card */
    .card { max-width: 500px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; border: 1px solid rgba(0,0,0,0.05); transition: 0.5s; }
    body.space-mode .card { background: rgba(0, 5, 12, 0.9); border-color: var(--core); box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); color: white; }

    .btn { background: var(--brand); color: white; border: none; padding: 18px 30px; border-radius: 12px; font-family: 'Orbitron'; cursor: pointer; width: 100%; font-size: 14px; letter-spacing: 1px; }
    .btn-vip { background: var(--core); color: #000; display: none; margin-top: 20px; }

    /* Flash Overlay */
    #flash { display: none; position: fixed; inset: 0; background: #000; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    .blink { animation: blink 0.5s infinite; color: var(--brand); font-family: 'Orbitron'; font-size: 20px; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .score-circle { width: 100px; height: 100px; border-radius: 50%; border: 5px solid var(--brand); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 32px; margin: 20px auto; }
    body.space-mode .score-circle { border-color: var(--core); box-shadow: 0 0 20px var(--core); }
  </style>
</head>
<body>

  <div id="flash">
    <div class="blink">! ATMOSPHERIC CEILING REACHED</div>
    <p style="color: white; font-family: Rajdhani; margin-top: 20px;">Standard scan cannot bypass sub-space filters.</p>
    <div style="width: 200px; height: 2px; background: #333; margin-top: 20px;"><div id="bar" style="width: 0%; height: 100%; background: var(--core);"></div></div>
  </div>

  <nav class="nav">
    <div class="logo-wrap">
      <div class="logo-mark"></div>
      <span class="logo-name" id="logo-text">ResumeAI™</span>
    </div>
  </nav>

  <div class="card" id="main-card">
    <div id="upload-stage">
      <p style="font-weight: 500;">Initial Vocation Calibration Required</p>
      <input type="file" id="fileInput" hidden>
      <button class="btn" onclick="document.getElementById('fileInput').click()">SELECT DATA VECTORS</button>
    </div>

    <div id="result-stage" style="display:none;">
      <div class="score-circle" id="score">0</div>
      <p id="msg">Score Below Cutoff. Injected keywords required.</p>
      <button class="btn" id="retry-btn" onclick="resetScan()">TRY ONE MORE FREE SCAN</button>
      <button class="btn btn-vip" id="vip-btn" onclick="redirectToPilot()">INITIALIZE PILOT PROTOCOL (₹99)</button>
    </div>
  </div>


<script>
<script>
    let scanCount = 0;
    const fileIn = document.getElementById('fileInput');

    // MOBILE OPTIMIZATION: Clear the input whenever it's tapped
    // This forces the "change" event to fire even if the user picks the same file
    fileIn.addEventListener('click', function() {
        this.value = null;
    });

    fileIn.onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        // Visual feedback for mobile users
        document.getElementById('status').innerText = "CALIBRATING VECTORS...";
        
        // Small delay to simulate "Thinking" (Good for UX)
        await new Promise(r => setTimeout(r, 1200));

        if(scanCount === 0) {
            // PHASE 1: Earth Results
            scanCount = 1;
            document.getElementById('upload-stage').style.display = 'none';
            document.getElementById('result-stage').style.display = 'block';
            document.getElementById('score').innerText = "42";
            document.getElementById('status').innerText = "SCAN_COMPLETE: BELOW_CUTOFF";
        } else {
            // PHASE 2: Trigger the Space Transition
            triggerFlash();
        }
    };

    function triggerFlash() {
        const flash = document.getElementById('flash');
        const bar = document.getElementById('bar');
        
        // Force the flash to show on top of everything
        flash.style.display = 'flex';
        
        let p = 0;
        const int = setInterval(() => {
            p += 5;
            bar.style.width = p + '%';
            if(p >= 100) {
                clearInterval(int);
                setTimeout(() => {
                    flash.style.display = 'none';
                    enableSpaceMode();
                }, 400);
            }
        }, 80); // Slightly faster for better mobile feel
    }

    function enableSpaceMode() {
        document.body.classList.add('space-mode');
        document.getElementById('logo-text').innerText = "ResumeAI™ Pilot";
        
        // Hide Earth UI and show the Tactical Results
        document.getElementById('upload-stage').style.display = 'none';
        document.getElementById('result-stage').style.display = 'block';
        
        document.getElementById('score').innerText = "58";
        document.getElementById('msg').innerHTML = "<b style='color:#ff4d00'>THREAT DETECTED:</b> Atmospheric Ceiling Reached. Manual Repair Required.";
        
        // Swap Buttons
        document.getElementById('retry-btn').style.display = 'none';
        document.getElementById('vip-btn').style.display = 'block';
        
        // Update status for the Space Deck feel
        document.getElementById('status').innerText = "ORBITAL_STALL_DETECTED";
    }

    function redirectToPilot() {
        const pilotName = "Pilot_Asset"; 
        // UPDATED TO YOUR LIVE LINK
        const PILOT_URL = "https://resume-pi-chi.vercel.app/onboarding.html";
        window.location.href = `${PILOT_URL}?source=resumeai&pilot=${pilotName}&price=99`;
    }
</script>
  </script>
</body>
</html>
