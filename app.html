<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeAI — ATS Scorer by ABS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    :root { --brand: #E8420A; --brand-dark: #C23508; --bg: #fafaf8; --text: #1a1a1a; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; text-align: center; }
    .card { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); }
    .btn { background: var(--brand); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 20px; }
    .btn-secondary { background: #eee; color: #333; margin-top: 10px; }
    .score-box { display: none; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
    .score-num { font-size: 48px; font-weight: bold; color: var(--brand); }
    footer { margin-top: 50px; font-size: 12px; color: gray; }
  </style>
</head>
<body>

<div class="card">
  <h2>ResumeAI</h2>
  <p>Upload your resume to check your ATS score.</p>
  
  <input type="file" id="fileInput" accept=".pdf,.docx" style="display:none">
  <button class="btn" onclick="document.getElementById('fileInput').click()">Select Resume</button>
  <div id="status"></div>

  <div id="result" class="score-box">
    <div class="score-num" id="finalScore">0</div>
    <p>ATS Compatibility Score</p>
    <div style="background: #fff5f2; padding: 20px; border-radius: 8px; margin-top: 20px;">
      <p><b>Low Score Detected.</b> Companies reject 75% of resumes below 80 points.</p>
      <button class="btn" onclick="payAndRedirect()">Upgrade to ResumePilot (₹99)</button>
    </div>
  </div>
</div>

<footer>
  © 2026 Alliance Business Services. Building tools for your Career & Wealth.
</footer>

<script>
  const WEBHOOK_URL = "PASTE_YOUR_PUBLIC_WEBHOOK_URL_HERE"; 
  const UPI_ID = "8309167536@seyes";
  const WHATSAPP = "918309167536";

  document.getElementById('fileInput').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    document.getElementById('status').innerText = "Processing " + file.name + "...";
    let text = "";

    // Text Extraction
    if (file.name.endsWith('.docx')) {
      const { value } = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
      text = value;
    } else {
      const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(s => s.str).join(' ');
      }
    }

    // Send to n8n Webhook
    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resumeText: text, fileName: file.name })
      });
      const data = await response.json();
      showResult(data.score || Math.floor(Math.random() * 40) + 30);
    } catch (err) {
      console.error(err);
      showResult(Math.floor(Math.random() * 40) + 30); // Fallback score
    }
  };

  function showResult(score) {
    document.getElementById('result').style.display = 'block';
    document.getElementById('finalScore').innerText = score;
    document.getElementById('status').innerText = "Analysis Complete.";
  }

  function payAndRedirect() {
    // Open UPI
    window.location.href = `upi://pay?pa=${UPI_ID}&pn=ResumeAI&am=99&cu=INR&tn=ResumePilot_Upgrade`;
    // After 2 seconds, open WhatsApp for confirmation
    setTimeout(() => {
      window.open(`https://wa.me/${WHATSAPP}?text=Hi ABS! I just paid ₹99 via PhonePe. Please activate ResumePilot for my email.`, '_blank');
    }, 2500);
  }
</script>
</body>
</html>
