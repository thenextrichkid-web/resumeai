<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeAI — Tactical Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E8420A; --bg: #fafaf8; --text: #1a1a1a; --border: rgba(0,0,0,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        .nav { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid var(--border); background: white; }
        .logo-wrap { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
        .diamond-mark { width: 20px; height: 20px; background: var(--brand); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%, 50% 35%, 65% 50%, 50% 65%, 35% 50%); }
        .logo-name { font-family: 'Instrument Serif', serif; font-size: 20px; font-weight: bold; }

        .container { max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; }
        .pilot-welcome { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--brand); font-weight: 700; margin-bottom: 8px; }
        h1 { font-family: 'Instrument Serif', serif; font-size: 36px; line-height: 1.1; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 10px; font-weight: 700; color: var(--brand); margin-bottom: 6px; display: block; letter-spacing: 1px; }
        textarea, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border); font-size: 14px; font-family: inherit; outline: none; box-sizing: border-box; }
        
        .upload-box { border: 2px dashed var(--border); padding: 40px 20px; border-radius: 20px; background: white; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--brand); background: #fffcfb; }
        
        #scan-container { display: none; margin-top: 30px; }
        .progress-track { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--brand); transition: width 0.1s; }

        #feedback-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.94); z-index:2000; align-items:center; justify-content:center; padding:15px; backdrop-filter: blur(10px); }
        .modal-card { background:white; padding:35px; border-radius:24px; max-width:550px; width:100%; text-align:left; color: #1a1a1a; max-height: 85vh; overflow-y: auto; }
        
        .report-body h1 { font-family: 'Instrument Serif'; color: var(--brand); font-size: 28px; margin: 0 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .report-body h3 { font-family: 'DM Sans'; font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: #888; margin-top: 15px; font-weight: 700; }
        .report-body p { line-height: 1.6; font-size: 14px; margin: 10px 0; color: #333; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }

        .btn-action { width:100%; padding:18px; background:var(--brand); color:white; border:none; border-radius:12px; margin-top:15px; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:1px; }
        body.dark-mode { background: #050505; color: white; }
        body.dark-mode .nav { background: #050505; border-bottom: 1px solid #222; }
        body.dark-mode .modal-card { background: #111; color: #efefef; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="nav">
    <a href="/" class="logo-wrap">
        <div class="diamond-mark"></div>
        <span class="logo-name">ResumeAI</span>
    </a>
</div>

<div class="container">
    <div class="pilot-welcome" id="pilot-display">PILOT AUTHORIZATION REQUIRED</div>
    <h1 id="headline">Initiate <span style="font-style: italic;">Tactical</span> Scan</h1>
    
    <div id="input-stage">
        <div class="input-group">
            <label>TARGET JOB DESCRIPTION</label>
            <textarea id="jd-input" rows="4" placeholder="Paste requirements here..."></textarea>
        </div>
        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 32px; margin-bottom: 10px;">📂</div>
            <p style="font-weight:600;">Click to Upload Resume</p>
            <input type="file" id="file-input" style="display:none" onchange="initiateScan(this)">
        </div>
    </div>

    <div id="scan-container">
        <p id="status-text" style="font-family: monospace; color: var(--brand); font-weight: bold; letter-spacing: 1px;">DECODING DATA STREAM...</p>
        <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
        <p id="percentage" style="font-family: 'Instrument Serif'; font-size: 32px;">0%</p>
    </div>
</div>

<div id="feedback-modal"><div class="modal-card" id="modal-content"></div></div>

<script>
    const pName = localStorage.getItem('pilot_name') || 'Pilot';
    const pEmail = localStorage.getItem('pilot_email') || 'User';
    document.getElementById('pilot-display').innerText = `PILOT: ${pName.toUpperCase()}`;

    let scanCount = 0;
    let fullAnalysis = "";

    async function initiateScan(input) {
        const jd = document.getElementById('jd-input').value;
        if (!jd || jd.length < 20) { alert("Insufficient JD data."); return; }
        
        if (input.files && input.files[0]) {
            triggerUI();
            const formData = new FormData();
            formData.append('resume', input.files[0]);
            formData.append('name', pName);
            formData.append('email', pEmail);
            formData.append('job_description', jd);

            try {
                const response = await fetch('https://alliancebusiness.app.n8n.cloud/webhook/resume-scan', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const rawData = await response.text();
                    // CLEANER: Strips JSON wrappers or code artifacts
                    try {
                        const parsed = JSON.parse(rawData);
                        fullAnalysis = parsed.text || rawData;
                    } catch(e) { fullAnalysis = rawData; }
                }
            } catch (err) { console.error("Link Error", err); }
        }
    }

    function triggerUI() {
        document.getElementById('input-stage').style.display = 'none';
        document.getElementById('scan-container').style.display = 'block';
        let width = 0;
        const interval = setInterval(() => {
            let cap = (scanCount === 0) ? 54 : 68;
            if (width >= cap) {
                clearInterval(interval);
                if (fullAnalysis) { scanCount++; showReport(); }
                else { setTimeout(triggerUI, 1000); }
            } else {
                width++;
                document.getElementById('progress-bar').style.width = width + '%';
                document.getElementById('percentage').innerText = width + '%';
            }
        }, 40);
    }

    function showReport() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('modal-content');
        
        const parts = fullAnalysis.split('[SCAN_2]');
        const scan1Raw = parts[0].replace('[SCAN_1]', '').trim();
        const scan2Raw = parts[1] ? parts[1].trim() : "";

        const format = (text) => {
            return text.replace(/# (.*)/g, '<h1>$1</h1>').replace(/### (.*)/g, '<h3>$1</h3>')
                       .replace(/\*\* (.*)\*\*/g, '<strong>$1</strong>').replace(/\* (.*)/g, '<li>$1</li>')
                       .replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
        };

        modal.style.display = 'flex';
        if (scanCount === 1) {
            content.innerHTML = `
                <div class="report-body">${format(scan1Raw)}</div>
                <button class="btn-action" onclick="closeModal()">Manual Correction & Re-Scan</button>
            `;
        } else {
            document.body.classList.add('dark-mode');
            content.innerHTML = `
                <div class="report-body">${format(scan2Raw)}</div>
                <button class="btn-action" onclick="triggerUPI()">Uplink to Pilot Expertise (PRO)</button>
            `;
        }
    }

    function closeModal() {
        document.getElementById('feedback-modal').style.display = 'none';
        document.getElementById('input-stage').style.display = 'block';
        document.getElementById('scan-container').style.display = 'none';
        fullAnalysis = ""; 
        // FIX: Clear the file input so the same file can be scanned again
        document.getElementById('file-input').value = "";
        document.getElementById('headline').innerHTML = "Secondary <span style='font-style: italic;'>Tactical</span> Scan";
    }

    function triggerUPI() {
        // PROFESSIONAL DEEP LINK: Replace YOUR-UPI-ID with your real ID
        const upiId = "yourname@okaxis"; 
        const amount = "199.00";
        const name = "ResumeAI Pro";
        const note = `Pilot Uplink for ${pName}`;
        
        const upiUrl = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&tn=${encodeURIComponent(note)}&cu=INR`;
        
        // This opens the UPI app directly
        window.location.href = upiUrl;

        // Simulate success and redirect to Dashboard after a delay
        setTimeout(() => {
            alert("Payment intent sent. Redirecting to Pilot Dashboard...");
            window.location.href = "dashboard.html"; 
        }, 3000);
    }
</script>
</body>
</html>
