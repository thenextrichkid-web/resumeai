<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeAI — Tactical Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E8420A; --bg: #fafaf8; --text: #1a1a1a; --border: rgba(0,0,0,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 0.8s; overflow-x: hidden; }
        
        /* Fixed Header */
        .nav { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid var(--border); background: white; position: sticky; top: 0; z-index: 1000; }
        .logo-wrap { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
        .diamond-mark { width: 20px; height: 20px; background: var(--brand); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%, 50% 35%, 65% 50%, 50% 65%, 35% 50%); }
        .logo-name { font-family: 'Instrument Serif', serif; font-size: 20px; font-weight: bold; }

        .container { max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; }
        .pilot-welcome { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--brand); font-weight: 700; margin-bottom: 8px; }
        h1 { font-family: 'Instrument Serif', serif; font-size: 36px; line-height: 1.1; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 10px; font-weight: 700; color: var(--brand); margin-bottom: 6px; display: block; letter-spacing: 1px; }
        textarea, select { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border); font-size: 14px; font-family: inherit; outline: none; box-sizing: border-box; background: white; }
        
        .upload-box { border: 2px dashed var(--border); padding: 40px 20px; border-radius: 20px; background: white; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--brand); background: #fffcfb; }
        
        #scan-container { display: none; margin-top: 30px; }
        .progress-track { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; margin: 20px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--brand); transition: width 0.1s; }

        /* Modal & Payment Styling */
        #feedback-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.94); z-index: 2000; align-items:center; justify-content:center; padding:15px; backdrop-filter: blur(10px); }
        .modal-card { background:white; padding:40px; border-radius:28px; max-width:480px; width:100%; text-align:center; color: #1a1a1a; max-height: 85vh; overflow-y: auto; position: relative; }
        
        .discount-tag { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--brand); color: white; padding: 6px 16px; border-radius: 50px; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .pay-amount { font-family: 'Instrument Serif'; font-size: 56px; color: var(--brand); margin: 10px 0; }
        
        .btn-pay-upi { width:100%; padding:20px; background:var(--text); color:white; border:none; border-radius:14px; margin-top:15px; font-weight:700; cursor:pointer; text-transform:uppercase; font-size: 14px; letter-spacing: 1px; }
        .btn-whatsapp { width:100%; padding:18px; background:#25D366; color:white; border:none; border-radius:14px; margin-top:12px; font-weight:700; cursor:pointer; text-transform:uppercase; display:flex; align-items:center; justify-content:center; gap: 10px; text-decoration: none; font-size: 13px; }

        .report-body { text-align: left; }
        .report-body h1 { font-family: 'Instrument Serif'; color: var(--brand); font-size: 28px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .report-body p { line-height: 1.6; font-size: 14px; color: #333; }

        body.dark-mode { background: #050505; color: white; }
        body.dark-mode .nav { background: #050505; border-bottom: 1px solid #222; }
        body.dark-mode .modal-card { background: #111; color: #efefef; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="nav">
    <a href="index.html" class="logo-wrap">
        <div class="diamond-mark"></div>
        <span class="logo-name">ResumeAI</span>
    </a>
</div>

<div class="container">
    <div class="pilot-welcome" id="pilot-display">PILOT AUTHORIZATION REQUIRED</div>
    <h1 id="headline">Initiate <span style="font-style: italic;">Tactical</span> Scan</h1>
    
    <div id="input-stage">
        <div class="input-group">
            <label>ACQUISITION SOURCE</label>
            <select id="source-input">
                <option value="LinkedIn">LinkedIn</option>
                <option value="Instagram">Instagram</option>
                <option value="Direct">Direct/Other</option>
            </select>
        </div>
        <div class="input-group">
            <label>TARGET JOB DESCRIPTION</label>
            <textarea id="jd-input" rows="4" placeholder="Paste JD requirements..."></textarea>
        </div>
        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 32px; margin-bottom: 10px;">📂</div>
            <p style="font-weight:600;">Upload Resume for Analysis</p>
            <input type="file" id="file-input" style="display:none" onchange="initiateScan(this)">
        </div>
    </div>

    <div id="scan-container">
        <p id="status-text" style="font-family: monospace; color: var(--brand); font-weight: bold;">UPLINKING...</p>
        <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
        <p id="percentage" style="font-family: 'Instrument Serif'; font-size: 32px;">0%</p>
    </div>
</div>

<div id="feedback-modal"><div class="modal-card" id="modal-content"></div></div>

<script>
    const pName = localStorage.getItem('pilot_name') || 'Pilot';
    const pEmail = localStorage.getItem('pilot_email') || 'User';
    document.getElementById('pilot-display').innerText = `PILOT: ${pName.toUpperCase()}`;

    let scanCount = 0;
    let fullAnalysis = "";

    async function initiateScan(input) {
        if (!document.getElementById('jd-input').value) { alert("Missing JD."); return; }
        if (input.files && input.files[0]) {
            triggerUI();
            const formData = new FormData();
            formData.append('resume', input.files[0]);
            formData.append('name', pName);
            formData.append('email', pEmail);
            formData.append('source', document.getElementById('source-input').value);
            formData.append('job_description', document.getElementById('jd-input').value);

            try {
                const response = await fetch('https://alliancebusiness.app.n8n.cloud/webhook/resume-scan', { method: 'POST', body: formData });
                if (response.ok) {
                    const raw = await response.text();
                    try { const parsed = JSON.parse(raw); fullAnalysis = parsed.text || raw; } catch(e) { fullAnalysis = raw; }
                }
            } catch (err) { console.error(err); }
        }
    }

    function triggerUI() {
        document.getElementById('input-stage').style.display = 'none';
        document.getElementById('scan-container').style.display = 'block';
        let width = 0;
        const interval = setInterval(() => {
            let cap = (scanCount === 0) ? 54 : 72;
            if (width >= cap) {
                clearInterval(interval);
                if (fullAnalysis) { scanCount++; showReport(); }
                else { setTimeout(triggerUI, 1000); }
            } else { width++; document.getElementById('progress-bar').style.width = width + '%'; document.getElementById('percentage').innerText = width + '%'; }
        }, 40);
    }

    function showReport() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('modal-content');
        const parts = fullAnalysis.split('[SCAN_2]');
        const scan1 = parts[0].replace('[SCAN_1]', '').trim();
        
        const format = (text) => text.replace(/# (.*)/g, '<h1>$1</h1>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');

        modal.style.display = 'flex';
        if (scanCount === 1) {
            content.innerHTML = `<div class="report-body">${format(scan1)}</div><button class="btn-pay-upi" style="background:var(--brand)" onclick="closeModal()">Manual Correction & Re-Scan</button>`;
        } else {
            document.body.classList.add('dark-mode');
            content.innerHTML = `
                <div class="discount-tag">90% Recon Applied</div>
                <div style="font-size: 40px; margin-bottom: 10px;">🛡️</div>
                <h1 style="font-family:'Instrument Serif'; margin:0;">Analysis Capped</h1>
                <p style="font-size:13px; color:#999; margin: 15px 0;">Unlock the full 100% Reconstruct report with expert tactical verification.</p>
                <div class="pay-amount">₹99</div>
                
                <button class="btn-pay-upi" onclick="triggerUPI()">Pay via UPI App</button>
                
                <a href="https://wa.me/918309167536?text=Verification%20for%20Pilot%20${encodeURIComponent(pName)}" class="btn-whatsapp">
                    Send Screenshot to WhatsApp
                </a>

                <button onclick="closeModal()" style="background:none; border:none; color:#666; font-size:11px; margin-top:20px; cursor:pointer;">Dismiss</button>
            `;
        }
    }

    function triggerUPI() {
        const upiId = "alliancebusiness.abs@okaxis"; 
        const amount = "99.00";
        const name = "ResumeAI Pro";
        const note = `Pilot Uplink for ${pName}`;
        window.location.href = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&tn=${encodeURIComponent(note)}&cu=INR`;
    }

    function closeModal() {
        document.getElementById('feedback-modal').style.display = 'none';
        document.getElementById('input-stage').style.display = 'block';
        document.getElementById('scan-container').style.display = 'none';
        fullAnalysis = ""; 
        document.getElementById('file-input').value = "";
    }
</script>
</body>
</html>
