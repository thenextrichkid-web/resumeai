<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeAI — Powered by ABS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
  <style>
    :root { --brand: #E8420A; --brand-dark: #C23508; --bg: #fafaf8; --text: #1a1a1a; --border: rgba(0,0,0,0.1); }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; line-height: 1.6; }
    .logo-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; text-decoration: none; }
    .logo-mark { width: 32px; height: 32px; background: var(--brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; }
    .logo-name { font-size: 22px; font-weight: 700; color: var(--text); }
    .card { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--border); text-align: center; }
    .upload-container { border: 2px dashed var(--border); border-radius: 12px; padding: 30px 20px; margin-bottom: 20px; transition: 0.3s; }
    .btn { background: var(--brand); color: white; border: none; padding: 14px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; width: 100%; box-sizing: border-box; }
    .btn-secondary { background: transparent; color: var(--brand); border: 1.5px solid var(--brand); margin-top: 10px; }
    .result-box { display: none; margin-top: 30px; }
    .score-circle { width: 90px; height: 90px; border-radius: 50%; border: 6px solid var(--brand); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; margin: 0 auto 15px; }
    .nudge-card { background: #fff5f2; border: 1px solid #ffdec2; padding: 15px; border-radius: 10px; margin-top: 15px; font-size: 13px; text-align: left; }
    footer { margin-top: 40px; font-size: 12px; color: #999; text-align: center; }
  </style>
</head>
<body>

  <a href="/" class="logo-wrap">
    <div class="logo-mark">R</div>
    <span class="logo-name">ResumeAI</span>
  </a>

  <div class="card">
    <div class="upload-container">
      <p id="status-msg" style="margin-bottom: 15px; font-size: 14px; font-weight: 500;">Tap to upload Resume (PDF/DOCX)</p>
      <input type="file" id="fileInput" hidden accept=".pdf,.docx">
      <button class="btn" id="upload-btn" onclick="document.getElementById('fileInput').click()">Select File</button>
    </div>

    <div id="result-box" class="result-box">
      <div class="score-circle" id="score-val">0</div>
      
      <div id="nudge-section">
        <div class="nudge-card">
          <p><b>⚠️ Score: Below Cutoff</b></p>
          <p>Missing industry keywords. Add more <b>'Action Verbs'</b> and try one more free scan!</p>
        </div>
        <button class="btn btn-secondary" onclick="resetForSecondTry()">Try One More Free Scan</button>
      </div>

      <div id="paywall-section" style="display:none; background: #fff5f2; border: 2px solid var(--brand); padding: 20px; border-radius: 12px; margin-top: 20px;">
        <p style="font-weight: 700; color: var(--brand);">Reach the 80+ Cutoff Instantly</p>
        <p style="font-size: 13px; margin-bottom: 15px;">Don't leave your career to chance. **ResumePilot** will fix it for you.</p>
        <button class="btn" onclick="payAndRedirect()">Upgrade to ResumePilot (₹199)</button>
      </div>
    </div>
  </div>

  <footer>© 2026 Alliance Business Services</footer>

    const file = e.target.files[0];

try {

        })
    });

    console.log("Sync delayed, showing local score.");
}

    setTimeout(() => {
      scanCount++;

        document.getElementById('nudge-section').style.display = "block";

  };

  function resetForSecondTry() {
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('status-msg').innerText = "Tap to upload Resume (PDF/DOCX)";
    document.getElementById('fileInput').value = "";

</script>
</body>
</html>
