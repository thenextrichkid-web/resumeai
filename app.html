<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeAI — Tactical Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand: #E8420A; --bg: #fafaf8; --text: #1a1a1a; --border: rgba(0,0,0,0.1); }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: background 1.5s ease-in-out; overflow-x: hidden; }
        
        .nav { display: flex; align-items: center; justify-content: space-between; padding: 15px 5%; border-bottom: 1px solid var(--border); background: white; position: sticky; top: 0; z-index: 1000; }
        .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
        .diamond-mark { width: 22px; height: 22px; background: var(--brand); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%, 50% 35%, 65% 50%, 50% 65%, 35% 50%); }
        .logo-name { font-family: 'Instrument Serif', serif; font-size: 22px; font-weight: bold; }

        .container { max-width: 600px; margin: 40px auto; padding: 20px; text-align: center; }
        h1 { font-family: 'Instrument Serif', serif; font-size: clamp(34px, 8vw, 44px); line-height: 1.1; margin-bottom: 25px; }

        .upload-box { border: 2px dashed var(--border); padding: 50px 20px; border-radius: 28px; background: white; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        
        #scan-container { display: none; margin-top: 40px; }
        .progress-track { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; margin: 25px 0; }
        .progress-fill { width: 0%; height: 100%; background: var(--brand); transition: width 0.1s; }

        #feedback-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:2000; align-items:center; justify-content:center; padding:15px; backdrop-filter: blur(15px); }
        .modal-card { background:white; padding:35px; border-radius:32px; max-width: 480px; width:100%; text-align:center; color: #1a1a1a; max-height: 90vh; overflow-y: auto; position: relative; }
        
        body.space-mode { background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%); }
        .space-card { background: rgba(10, 10, 20, 0.98) !important; border: 1px solid rgba(232, 66, 10, 0.3) !important; color: white !important; }
        
        /* PRICE ANIMATION */
        .price-strike { font-size: 20px; color: #666; margin-right: 10px; position: relative; display: inline-block; transition: 0.5s; }
        .price-strike.slashed::after { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 2px; background: #E8420A; transform: rotate(-12deg); }
        .price-active { font-family: 'Instrument Serif'; font-size: 64px; color: var(--brand); opacity: 0; transform: translateY(10px); transition: 1s ease-out; }
        .price-active.reveal { opacity: 1; transform: translateY(0); }

        .qr-wrap { background: white; padding: 15px; border-radius: 20px; width: 180px; margin: 20px auto; box-shadow: 0 0 30px rgba(232,66,10,0.2); }
        .qr-wrap img { width: 100%; height: auto; display: block; }

        .upi-copy { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 12px; border-radius: 10px; margin: 15px 0; font-family: monospace; cursor: pointer; display: flex; justify-content: space-between; font-size: 13px; }

        .btn-action { width: 100%; padding: 18px; background: var(--brand); color: white; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; margin-top: 10px; }
        .btn-whatsapp { background: #25D366; }
    </style>
</head>
<body>

<div class="nav">
    <a href="/" class="logo-wrap"><div class="diamond-mark"></div><span class="logo-name">ResumeAI</span></a>
    <div class="nav-links">
        <a onclick="alert('Strategy: Multi-Pass AI Calibration Active.')">Strategy</a>
        <a onclick="alert('Support: 8309167536@seyes')">Contact</a>
    </div>
</div>

<div class="container">
    <div class="pilot-welcome" id="pilot-display">PILOT AUTH REQUIRED</div>
    <h1>Initiate <span style="font-style: italic;">Tactical</span> Scan</h1>
    
    <div id="input-stage">
        <textarea id="jd-input" rows="4" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); margin-bottom:20px;" placeholder="Paste Job Description..."></textarea>
        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <div style="font-size: 32px; margin-bottom: 10px;">📂</div>
            <p style="font-weight:700;">Uplink Resume File</p>
            <input type="file" id="file-input" style="display:none" onchange="initiateScan(this)">
        </div>
    </div>

    <div id="scan-container">
        <p id="status-text" style="font-family: monospace; color: var(--brand); font-weight: 800;">DECODING...</p>
        <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
        <p id="percentage" style="font-family: 'Instrument Serif'; font-size: 38px;">0%</p>
    </div>
</div>

<div id="feedback-modal"><div class="modal-card" id="modal-content"></div></div>

<script>
    const pName = localStorage.getItem('pilot_name') || 'Guest';
    let scanCount = 0;
    let fullAnalysis = "";

    async function initiateScan(input) {
        if (!document.getElementById('jd-input').value) { alert("JD Required."); return; }
        triggerUI();

        if (!fullAnalysis && input.files && input.files[0]) {
            const formData = new FormData();
            formData.append('resume', input.files[0]);
            formData.append('job_description', document.getElementById('jd-input').value);
            formData.append('name', pName);

            try {
                const response = await fetch('https://alliancebusiness.app.n8n.cloud/webhook/resume-scan', { method: 'POST', body: formData });
                fullAnalysis = await response.text();
            } catch (err) { console.error(err); }
        }
        input.value = ""; 
    }

    function triggerUI() {
        document.getElementById('input-stage').style.display = 'none';
        document.getElementById('scan-container').style.display = 'block';
        let width = 0;
        const interval = setInterval(() => {
            let cap = (scanCount === 0) ? 54 : 72;
            if (width >= cap) {
                clearInterval(interval);
                if (fullAnalysis) { scanCount++; showReport(); }
                else { setTimeout(triggerUI, 1000); }
            } else { width++; document.getElementById('progress-bar').style.width = width + '%'; document.getElementById('percentage').innerText = width + '%'; }
        }, 50);
    }

    function showReport() {
        const modal = document.getElementById('feedback-modal');
        const content = document.getElementById('modal-content');
        const parts = fullAnalysis.split('[SCAN_2]');
        const scan1 = parts[0].replace('[SCAN_1]', '').trim();
        const format = (t) => t.replace(/# (.*)/g, '<h1>$1</h1>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');

        modal.style.display = 'flex';
        if (scanCount === 1) {
            content.className = "modal-card";
            content.innerHTML = `<div style="text-align:left;">${format(scan1)}</div><button onclick="closeModal()" class="btn-action">MANUAL FIX & RE-SCAN</button>`;
        } else {
            triggerSpaceBridge();
        }
    }

    function triggerSpaceBridge() {
        const content = document.getElementById('modal-content');
        document.body.classList.add('space-mode');
        content.className = "modal-card space-card";
        const upiID = "8309167536@seyes";
        const upiLink = `upi://pay?pa=${upiID}&pn=ResumeAI&am=99&cu=INR`;

        content.innerHTML = `
            <div style="background:var(--brand); padding:5px 10px; border-radius:4px; font-size:10px; font-weight:900; display:inline-block; margin-bottom:10px;">90% RECON DISCOUNT</div>
            <div class="shield-glow">🛡️</div>
            <div style="margin:10px 0;">
                <span id="strike-p" class="price-strike">₹999</span>
                <div id="reveal-p" class="price-active">₹99</div>
            </div>

            <div class="qr-wrap">
                <img src="qr-code.jpg" alt="Scan to Pay">
            </div>

            <button onclick="window.location.href='${upiLink}'" class="btn-action">Unlock Pro AccessP</button>

            <div class="upi-copy" onclick="copyUPI('${upiID}')">
                <span id="upi-val">${upiID}</span><span style="color:var(--brand)">COPY</span>
            </div>

            <button onclick="window.location.href='https://wa.me/918309167536?text=Payment%20Done'" class="btn-action btn-whatsapp">SEND UTR VIA WHATSAPP</button>
            <a onclick="closeModal()" style="display:block; margin-top:15px; font-size:10px; color:#555; cursor:pointer;">CLOSE</a>
        `;

        setTimeout(() => {
            document.getElementById('strike-p').classList.add('slashed');
            document.getElementById('reveal-p').classList.add('reveal');
        }, 1200);
    }

    function copyUPI(id) {
        navigator.clipboard.writeText(id);
        document.getElementById('upi-val').innerText = "COPIED!";
        setTimeout(() => { document.getElementById('upi-val').innerText = id; }, 2000);
    }

    function closeModal() {
        document.getElementById('feedback-modal').style.display = 'none';
        document.getElementById('input-stage').style.display = 'block';
        document.getElementById('scan-container').style.display = 'none';
        document.body.classList.remove('space-mode');
    }
</script>
</body>
</html>
